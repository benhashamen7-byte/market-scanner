<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנוע סריקת שוק | AI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1318;
    --surface2: #111820;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --accent3: #ff6b35;
    --gold: #ffd700;
    --text: #e8f4f8;
    --muted: #5a7a8a;
    --buy: #00ff88;
    --sell: #ff4444;
    --hold: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .last-scan {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Scan button */
  .scan-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    border: none;
    padding: 14px 28px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    justify-content: center;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  .scan-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.3); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .scan-icon { font-size: 18px; }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .mode-tab {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'Rubik', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mode-tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Loading */
  .loading-overlay {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .loading-overlay.active { display: block; }

  .loading-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 16px 0 8px;
  }

  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .loading-asset {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  /* Asset card */
  .assets-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .asset-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .asset-card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    background: var(--surface2);
  }

  .asset-info { display: flex; align-items: center; gap: 12px; }

  .asset-emoji { font-size: 24px; }

  .asset-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .asset-symbol {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .score-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    border: 2px solid;
  }

  .score-high { border-color: var(--buy); color: var(--buy); background: rgba(0,255,136,0.08); }
  .score-mid { border-color: var(--hold); color: var(--hold); background: rgba(255,215,0,0.08); }
  .score-low { border-color: var(--sell); color: var(--sell); background: rgba(255,68,68,0.08); }

  .rec-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
  }

  .rec-buy { background: rgba(0,255,136,0.15); color: var(--buy); border: 1px solid rgba(0,255,136,0.3); }
  .rec-sell { background: rgba(255,68,68,0.15); color: var(--sell); border: 1px solid rgba(255,68,68,0.3); }
  .rec-hold { background: rgba(255,215,0,0.15); color: var(--hold); border: 1px solid rgba(255,215,0,0.3); }

  /* Card body */
  .card-body {
    padding: 20px;
    display: none;
    border-top: 1px solid var(--border);
  }

  .card-body.open { display: block; }

  /* Tabs inside card */
  .inner-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .inner-tab {
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
    transition: all 0.15s;
    font-family: 'Rubik', sans-serif;
  }

  .inner-tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .metric-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .metric-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .metric-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }

  .metric-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .val-green { color: var(--buy); }
  .val-red { color: var(--sell); }
  .val-yellow { color: var(--hold); }
  .val-blue { color: var(--accent); }

  /* Analysis text */
  .analysis-section {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .analysis-title {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .analysis-text {
    font-size: 13px;
    line-height: 1.7;
    color: #b0c8d4;
  }

  /* News items */
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .news-item:last-child { border-bottom: none; }

  .news-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  /* Levels */
  .levels-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .level-tag {
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }

  .level-support { background: rgba(0,255,136,0.1); color: var(--buy); border: 1px solid rgba(0,255,136,0.2); }
  .level-resist { background: rgba(255,68,68,0.1); color: var(--sell); border: 1px solid rgba(255,68,68,0.2); }
  .level-fib { background: rgba(255,215,0,0.1); color: var(--hold); border: 1px solid rgba(255,215,0,0.2); }

  /* Sentiment bar */
  .sentiment-bar-wrap { margin: 8px 0; }
  .sentiment-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .sentiment-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .sentiment-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 13px; }

  /* chevron */
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .chevron.open { transform: rotate(180deg); }

  /* Market Overview Panel */
  .overview-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    display: none;
  }
  .overview-panel.visible { display: block; }

  .overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .overview-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.3px;
  }

  .overview-body { padding: 14px 18px; }

  .ov-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .ov-row:last-child { border-bottom: none; padding-bottom: 0; }

  .ov-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .ov-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.6px;
    margin-bottom: 3px;
    text-transform: uppercase;
  }

  .ov-value {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .ov-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tag-hot   { background: rgba(255,107,53,0.15); color: var(--accent3); border: 1px solid rgba(255,107,53,0.3); }
  .tag-bull  { background: rgba(0,255,136,0.1);   color: var(--buy);     border: 1px solid rgba(0,255,136,0.25); }
  .tag-bear  { background: rgba(255,68,68,0.1);   color: var(--sell);    border: 1px solid rgba(255,68,68,0.25); }
  .tag-watch { background: rgba(255,215,0,0.1);   color: var(--hold);    border: 1px solid rgba(255,215,0,0.25); }
  .tag-buzz  { background: rgba(0,212,255,0.1);   color: var(--accent);  border: 1px solid rgba(0,212,255,0.25); }

  /* Earnings */
  .earnings-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 12px;
  }
  .earnings-urgent { background: rgba(255,107,53,0.12); border: 1px solid rgba(255,107,53,0.4); color: var(--accent3); }
  .earnings-soon   { background: rgba(255,215,0,0.10);  border: 1px solid rgba(255,215,0,0.35);  color: var(--hold); }
  .earnings-none   { background: rgba(90,122,138,0.10); border: 1px solid var(--border);         color: var(--muted); }

  .earnings-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .eps-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .eps-box {
    flex: 1;
    min-width: 100px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }

  .eps-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px; }
  .eps-val   { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; }

  /* Trade Setup */
  .trade-setup-box {
    background: var(--bg);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .trade-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .trade-direction {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dir-long  { color: var(--buy); }
  .dir-short { color: var(--sell); }
  .dir-wait  { color: var(--muted); }

  .confidence-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .conf-high { border-color: var(--buy); color: var(--buy); background: rgba(0,255,136,0.08); }
  .conf-mid  { border-color: var(--hold); color: var(--hold); background: rgba(255,215,0,0.08); }
  .conf-low  { border-color: var(--muted); color: var(--muted); }

  .price-ladder {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ladder-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ladder-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.6px;
    width: 56px;
    flex-shrink: 0;
  }

  .ladder-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
  }

  .ladder-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg);
  }

  .ladder-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    width: 80px;
    text-align: left;
  }

  .rr-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 4px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin: 4px 16px 12px;
  }

  .condition-box {
    margin: 0 16px 12px;
    padding: 10px 12px;
    border-radius: 6px;
    border-right: 3px solid var(--accent);
    background: rgba(0,212,255,0.04);
    font-size: 12px;
    line-height: 1.6;
    color: #b0c8d4;
  }

  .invalid-box {
    margin: 0 16px 14px;
    padding: 10px 12px;
    border-radius: 6px;
    border-right: 3px solid var(--sell);
    background: rgba(255,68,68,0.04);
    font-size: 12px;
    line-height: 1.6;
    color: #d4b0b0;
  }

  .invalid-label {
    font-size: 10px;
    color: var(--sell);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulsing { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">מנוע <span>AI</span> שוק</div>
    <div class="last-scan" id="lastScanTime">לא נסרק עדיין</div>
  </header>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <div class="mode-tab active" onclick="setMode('both')" id="tab-both">📊 יומי + סווינג</div>
    <div class="mode-tab" onclick="setMode('daily')" id="tab-daily">⚡ יומי בלבד</div>
    <div class="mode-tab" onclick="setMode('swing')" id="tab-swing">📈 סווינג בלבד</div>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn" onclick="runScan()">
    <span class="scan-icon">🔍</span>
    סרוק את כל הנכסים עכשיו
  </button>

  <!-- Market Overview Panel -->
  <div class="overview-panel" id="overviewPanel">
    <div class="overview-header" onclick="toggleOverview()">
      <div class="overview-title">🌍 סקירת שוק כללית</div>
      <span class="chevron" id="ovChev">▼</span>
    </div>
    <div class="overview-body" id="overviewBody">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingBox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;">🔍 סורק נכסים...</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);" id="loadingPct">0%</div>
    </div>
    <div class="loading-bar"><div class="loading-fill" id="loadingFill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;">
      <div class="loading-asset" id="loadingAsset">מאתחל...</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);" id="loadingCount">0 / 9</div>
    </div>
    <!-- Asset dots -->
    <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;" id="assetDots"></div>
  </div>

  <!-- Assets grid -->
  <div class="assets-grid" id="assetsGrid">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">המנוע מוכן לסריקה</div>
      <div class="empty-sub">לחץ על הכפתור כדי לנתח את 9 הנכסים שלך</div>
    </div>
  </div>

</div>

<script>
const ASSETS = [
  { name: 'ביטקוין', symbol: 'BTC-USD', emoji: '₿', type: 'crypto' },
  { name: 'את\'ריום', symbol: 'ETH-USD', emoji: 'Ξ', type: 'crypto' },
  { name: 'אנבידיה', symbol: 'NVDA', emoji: '🟢', type: 'stock' },
  { name: 'AST SpaceMobile', symbol: 'ASTS', emoji: '🛰️', type: 'stock' },
  { name: 'זהב', symbol: 'GC=F', emoji: '🥇', type: 'commodity' },
  { name: 'נפט גולמי', symbol: 'CL=F', emoji: '🛢️', type: 'commodity' },
  { name: 'Plug Power', symbol: 'PLUG', emoji: '⚡', type: 'stock' },
  { name: 'Innoviz Tech', symbol: 'INVZ', emoji: '🔦', type: 'stock' },
  { name: 'SoFi', symbol: 'SOFI', emoji: '💳', type: 'stock' },
];

let currentMode = 'both';
let scanResults = {};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');
}

async function runScan() {
  const btn = document.getElementById('scanBtn');
  const loading = document.getElementById('loadingBox');
  const grid = document.getElementById('assetsGrid');
  const total = ASSETS.length;

  btn.disabled = true;
  btn.innerHTML = '<span class="pulsing">⏳</span> סורק...';
  loading.classList.add('active');
  grid.innerHTML = '';
  document.getElementById('overviewPanel').classList.remove('visible');

  // Build asset dots
  const dotsEl = document.getElementById('assetDots');
  dotsEl.innerHTML = ASSETS.map((a,i) =>
    `<span id="dot-${i}" title="${a.name}" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg);transition:all 0.3s;">${a.emoji}</span>`
  ).join('');

  // Scan each asset one by one
  for (let i = 0; i < total; i++) {
    const asset = ASSETS[i];
    const dot = document.getElementById('dot-' + i);

    // Mark current
    dot.style.borderColor = 'var(--accent)';
    dot.style.boxShadow = '0 0 8px rgba(0,212,255,0.5)';

    const pct = Math.round((i / total) * 100);
    document.getElementById('loadingFill').style.width = pct + '%';
    document.getElementById('loadingPct').textContent = pct + '%';
    document.getElementById('loadingAsset').textContent = `מנתח: ${asset.name} (${asset.symbol})`;
    document.getElementById('loadingCount').textContent = `${i} / ${total}`;

    const result = await analyzeAsset(asset);
    scanResults[asset.symbol] = result;
    renderCard(asset, result, grid);

    // Mark done
    dot.style.borderColor = result ? 'var(--buy)' : 'var(--sell)';
    dot.style.background = result ? 'rgba(0,255,136,0.12)' : 'rgba(255,68,68,0.12)';
    dot.style.boxShadow = 'none';

    await sleep(200);
  }

  // 100%
  document.getElementById('loadingFill').style.width = '100%';
  document.getElementById('loadingPct').textContent = '100%';
  document.getElementById('loadingCount').textContent = `${total} / ${total}`;
  document.getElementById('loadingAsset').textContent = '✅ סריקת נכסים הושלמה — בונה סקירת שוק כללית...';

  // Now build market overview from real scan results
  const overview = await fetchMarketOverview();
  if (overview) renderOverview(overview);

  loading.classList.remove('active');
  btn.disabled = false;
  btn.innerHTML = '<span class="scan-icon">🔄</span> סרוק מחדש';
  document.getElementById('lastScanTime').textContent = 'נסרק: ' + new Date().toLocaleTimeString('he-IL');
}

async function fetchMarketOverview() {
  // Build summary from real scan results
  const scanSummary = ASSETS.map(a => {
    const r = scanResults[a.symbol];
    if (!r || !r.live) return null;
    const live = r.live;
    return {
      name: a.name,
      symbol: a.symbol,
      price: live.price,
      change_pct: live.change_pct,
      rsi_1d: live.rsi_1d,
      rsi_1w: live.rsi_1w,
      trend: live.trend,
      macd: live.macd,
      bb: live.bb?.signal,
      volume: live.volume_signal,
      support_1d: live.support_1d,
      resistance_1d: live.resistance_1d,
      analyst_rec: live.analyst_rec,
      analyst_target: live.analyst_target,
      daily_score: r.daily?.score,
      daily_rec: r.daily?.recommendation,
      swing_score: r.swing?.score,
      swing_rec: r.swing?.recommendation,
    };
  }).filter(Boolean);

  // Fetch hot movers from server
  let hotMovers = [];
  try {
    const res = await fetch(`${SERVER}/hot-movers`);
    if (res.ok) hotMovers = await res.json();
  } catch(e) {}

  // Build overview from real data
  const heroes = scanSummary
    .filter(a => a.daily_score >= 7 || a.swing_score >= 7)
    .sort((a,b) => Math.max(b.daily_score, b.swing_score) - Math.max(a.daily_score, a.swing_score))
    .slice(0, 3)
    .map(a => ({
      symbol: a.symbol,
      name: a.name,
      verdict: `ציון ${Math.max(a.daily_score, a.swing_score)}/10 | ${a.daily_rec} יומי | ${a.swing_rec} סווינג`,
      best_for: a.daily_score > a.swing_score ? 'יומי' : 'סווינג',
      direction: a.daily_rec === 'קנייה' ? 'long' : 'short',
      confidence: Math.max(a.daily_score, a.swing_score)
    }));

  const avoid = scanSummary
    .filter(a => a.daily_score <= 4 && a.swing_score <= 4)
    .slice(0, 2)
    .map(a => ({
      symbol: a.symbol,
      reason: `ציון נמוך ${a.daily_score}/10 | RSI: ${a.rsi_1d}`
    }));

  const bullCount = scanSummary.filter(a => a.trend === 'up').length;
  const pulse = bullCount >= 6 ? 'השוק בולי — רוב הנכסים במגמה עולה' :
                bullCount <= 3 ? 'השוק בריש — רוב הנכסים במגמה יורדת' :
                'שוק מעורב — כיוון לא ברור';

  return {
    market_pulse: pulse,
    watchlist_heroes: heroes,
    watchlist_avoid: avoid,
    market_hunters: hotMovers.map(m => ({
      symbol: m.symbol,
      name: m.name,
      move: `${m.change_pct > 0 ? '+' : ''}${m.change_pct}%`,
      why_hot: Math.abs(m.change_pct) >= 10 ? 'תנודה חדה 10%+' : 'שיח חם',
      buzz_source: 'Yahoo Finance Trending',
      can_ride: true,
      direction: m.change_pct > 0 ? 'long' : 'short',
      entry_idea: `$${m.price}`,
      risk: 'תנודתיות גבוהה'
    })),
    buzz_stocks: hotMovers.slice(0, 3).map(m => ({
      symbol: m.symbol,
      name: m.name,
      topic: `תנודה של ${m.change_pct > 0 ? '+' : ''}${m.change_pct}% היום`,
      sentiment: m.change_pct > 0 ? 'bull' : 'bear',
      one_liner: `${m.name} זז ${Math.abs(m.change_pct)}% היום`
    })),
    next_move_predictions: scanSummary.slice(0, 3).map(a => ({
      symbol: a.symbol,
      name: a.name,
      prediction: a.rsi_1d > 70 ? 'תיקון צפוי — RSI בקנייה יתר' :
                  a.rsi_1d < 30 ? 'ריבאונד צפוי — RSI במכירה יתר' :
                  `המשך מגמה ${a.trend === 'up' ? 'עולה' : 'יורדת'}`,
      basis: `RSI ${a.rsi_1d} | MACD ${a.macd} | ${a.trend}`,
      probability: a.daily_score >= 7 || a.daily_score <= 4 ? 'גבוהה' : 'בינונית'
    }))
  };
}

const SERVER = 'https://market-scanner-1-aswt.onrender.com';

async function fetchLiveData(symbol) {
  try {
    const res = await fetch(`${SERVER}/scan/${encodeURIComponent(symbol)}`);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

async function analyzeAsset(asset) {
  // Fetch live data from our server
  const live = await fetchLiveData(asset.symbol);
  
  if (!live || live.error) {
    return null;
  }

  // Build result directly from live data
  const rsiSignal = (rsi) => {
    if (!rsi) return 'ניטרלי';
    if (rsi > 70) return 'קנייה יתר';
    if (rsi < 30) return 'מכירה יתר';
    return 'ניטרלי';
  };

  const bbSignal = live.bb ? 
    (live.bb.signal === 'near_upper' ? 'מחיר ליד גבול עליון' : 
     live.bb.signal === 'near_lower' ? 'מחיר ליד גבול תחתון' : 'במרכז') : 'במרכז';

  const volSignal = live.volume_signal === 'high' ? 'גבוה מהממוצע' : 
                   live.volume_signal === 'low' ? 'נמוך מהממוצע' : 'ממוצע';

  const trend = live.trend === 'up' ? 'עולה' : 'יורד';
  const macdSignal = live.macd === 'up' ? 'עולה' : live.macd === 'down' ? 'יורד' : 'ניטרלי';

  // ============ DAILY PARAMETERS ============
  const dailyParams = [];

  // RSI שעתי
  if (live.rsi_1h !== null && live.rsi_1h !== undefined) {
    const bullish = live.rsi_1h < 50 && live.rsi_1h > 20;
    const bearish = live.rsi_1h > 60;
    const extreme = live.rsi_1h > 80 || live.rsi_1h < 20;
    dailyParams.push({
      name: 'RSI שעתי',
      value: live.rsi_1h,
      signal: extreme ? (live.rsi_1h > 80 ? 'מכירה יתר — אזהרה' : 'קנייה יתר — אזהרה') : bullish ? 'תומך קנייה' : bearish ? 'תומך מכירה' : 'ניטרלי',
      direction: extreme ? (live.rsi_1h > 80 ? 'sell' : 'buy') : bullish ? 'buy' : bearish ? 'sell' : 'neutral'
    });
  }

  // RSI יומי
  if (live.rsi_1d !== null && live.rsi_1d !== undefined) {
    const bullish = live.rsi_1d < 50 && live.rsi_1d > 20;
    const bearish = live.rsi_1d > 65;
    const oversold = live.rsi_1d < 30;
    const overbought = live.rsi_1d > 70;
    dailyParams.push({
      name: 'RSI יומי',
      value: live.rsi_1d,
      signal: overbought ? 'קנייה יתר — מכירה' : oversold ? 'מכירה יתר — קנייה' : bullish ? 'תומך קנייה' : bearish ? 'תומך מכירה' : 'ניטרלי',
      direction: overbought ? 'sell' : oversold ? 'buy' : bullish ? 'buy' : bearish ? 'sell' : 'neutral'
    });
  }

  // Bollinger Bands
  if (live.bb) {
    const sig = live.bb.signal;
    dailyParams.push({
      name: 'Bollinger Bands',
      value: `עליון ${live.bb.upper} | תחתון ${live.bb.lower}`,
      signal: sig === 'near_lower' ? 'ליד גבול תחתון — תומך קנייה' : sig === 'near_upper' ? 'ליד גבול עליון — תומך מכירה' : 'במרכז — ניטרלי',
      direction: sig === 'near_lower' ? 'buy' : sig === 'near_upper' ? 'sell' : 'neutral'
    });
  }

  // MACD
  if (live.macd) {
    dailyParams.push({
      name: 'MACD',
      value: live.macd === 'up' ? 'חיובי' : 'שלילי',
      signal: live.macd === 'up' ? 'תומך קנייה' : 'תומך מכירה',
      direction: live.macd === 'up' ? 'buy' : 'sell'
    });
  }

  // נפח
  if (live.volume_signal) {
    const isBuy = live.volume_signal === 'high' && live.change_pct > 0;
    const isSell = live.volume_signal === 'high' && live.change_pct < 0;
    dailyParams.push({
      name: 'נפח מסחר',
      value: volSignal + ` (${live.volume_today?.toLocaleString()})`,
      signal: isBuy ? 'נפח גבוה עם עלייה — חזק' : isSell ? 'נפח גבוה עם ירידה — חלש' : 'ממוצע — ניטרלי',
      direction: isBuy ? 'buy' : isSell ? 'sell' : 'neutral'
    });
  }

  // תמיכה/התנגדות שעתי
  if (live.support_1h && live.resistance_1h) {
    const nearSupport = live.price <= live.support_1h * 1.02;
    const nearResist = live.price >= live.resistance_1h * 0.98;
    dailyParams.push({
      name: 'תמיכה/התנגדות שעתי',
      value: `תמיכה ${live.support_1h} | התנגדות ${live.resistance_1h}`,
      signal: nearSupport ? 'ליד תמיכה — הזדמנות קנייה' : nearResist ? 'ליד התנגדות — אזהרה' : 'בין רמות — ניטרלי',
      direction: nearSupport ? 'buy' : nearResist ? 'sell' : 'neutral'
    });
  }

  // תמיכה/התנגדות יומי
  if (live.support_1d && live.resistance_1d) {
    const nearSupport = live.price <= live.support_1d * 1.02;
    const nearResist = live.price >= live.resistance_1d * 0.98;
    dailyParams.push({
      name: 'תמיכה/התנגדות יומי',
      value: `תמיכה ${live.support_1d} | התנגדות ${live.resistance_1d}`,
      signal: nearSupport ? 'ליד תמיכה — הזדמנות קנייה' : nearResist ? 'ליד התנגדות — אזהרה' : 'בין רמות — ניטרלי',
      direction: nearSupport ? 'buy' : nearResist ? 'sell' : 'neutral'
    });
  }

  // אנליסטים (יומי)
  if (live.analyst_rec) {
    const isBull = ['strong_buy', 'buy'].includes(live.analyst_rec);
    const isBear = ['sell', 'strong_sell'].includes(live.analyst_rec);
    dailyParams.push({
      name: 'דעת אנליסטים',
      value: live.analyst_rec + (live.analyst_target ? ` | יעד $${live.analyst_target}` : ''),
      signal: isBull ? 'המלצת קנייה' : isBear ? 'המלצת מכירה' : 'החזקה',
      direction: isBull ? 'buy' : isBear ? 'sell' : 'neutral'
    });
  }

  // חשב ציון יומי לפי פרמטרים
  const dailyBuy = dailyParams.filter(p => p.direction === 'buy').length;
  const dailySell = dailyParams.filter(p => p.direction === 'sell').length;
  const dailyTotal = dailyParams.length;
  const dailyDirection = dailyBuy > dailySell ? 'LONG' : dailySell > dailyBuy ? 'SHORT' : 'המתנה';
  const dailyRec = dailyBuy > dailySell ? 'קנייה' : dailySell > dailyBuy ? 'מכירה' : 'המתנה';
  const dailyScoreCount = `${dailyBuy > dailySell ? dailyBuy : dailySell}/${dailyTotal}`;

  // ============ SWING PARAMETERS ============
  const swingParams = [];

  // RSI שבועי
  if (live.rsi_1w !== null && live.rsi_1w !== undefined) {
    const oversold = live.rsi_1w < 40;
    const overbought = live.rsi_1w > 65;
    swingParams.push({
      name: 'RSI שבועי',
      value: live.rsi_1w,
      signal: overbought ? 'קנייה יתר — מכירה' : oversold ? 'מכירה יתר — קנייה' : live.rsi_1w < 50 ? 'תומך קנייה' : 'תומך מכירה',
      direction: overbought ? 'sell' : oversold ? 'buy' : live.rsi_1w < 50 ? 'buy' : 'sell'
    });
  }

  // MACD שבועי
  swingParams.push({
    name: 'MACD',
    value: live.macd === 'up' ? 'חיובי' : 'שלילי',
    signal: live.macd === 'up' ? 'תומך קנייה' : 'תומך מכירה',
    direction: live.macd === 'up' ? 'buy' : 'sell'
  });

  // מגמה
  swingParams.push({
    name: 'מגמה כללית',
    value: trend,
    signal: trend === 'עולה' ? 'מגמה עולה — תומך קנייה' : 'מגמה יורדת — תומך מכירה',
    direction: trend === 'עולה' ? 'buy' : 'sell'
  });

  // MA50/MA200
  if (live.ma50) {
    const above = live.price > live.ma50;
    swingParams.push({
      name: 'MA50',
      value: live.ma50,
      signal: above ? 'מחיר מעל MA50 — בולי' : 'מחיר מתחת MA50 — בריש',
      direction: above ? 'buy' : 'sell'
    });
  }
  if (live.ma200) {
    const above = live.price > live.ma200;
    swingParams.push({
      name: 'MA200',
      value: live.ma200,
      signal: above ? 'מחיר מעל MA200 — בולי ארוך טווח' : 'מחיר מתחת MA200 — בריש ארוך טווח',
      direction: above ? 'buy' : 'sell'
    });
  }

  // תמיכה/התנגדות שבועי
  if (live.support_1w && live.resistance_1w) {
    const nearSupport = live.price <= live.support_1w * 1.03;
    const nearResist = live.price >= live.resistance_1w * 0.97;
    swingParams.push({
      name: 'תמיכה/התנגדות שבועי',
      value: `תמיכה ${live.support_1w} | התנגדות ${live.resistance_1w}`,
      signal: nearSupport ? 'ליד תמיכה שבועית — קנייה' : nearResist ? 'ליד התנגדות שבועית — מכירה' : 'בין רמות',
      direction: nearSupport ? 'buy' : nearResist ? 'sell' : 'neutral'
    });
  }

  // פיבונאצ'י
  if (live.fib) {
    const fib618 = live.fib['0.618'];
    const fib382 = live.fib['0.382'];
    const nearFib618 = fib618 && Math.abs(live.price - fib618) / live.price < 0.02;
    const nearFib382 = fib382 && Math.abs(live.price - fib382) / live.price < 0.02;
    swingParams.push({
      name: 'פיבונאצ\'י',
      value: `0.382: ${live.fib['0.382']} | 0.5: ${live.fib['0.5']} | 0.618: ${live.fib['0.618']}`,
      signal: nearFib618 ? 'ליד פיבו 0.618 — תמיכה חזקה' : nearFib382 ? 'ליד פיבו 0.382 — התנגדות' : 'בין רמות פיבו',
      direction: nearFib618 ? 'buy' : nearFib382 ? 'sell' : 'neutral'
    });
  }

  // שיא/שפל 52 שבועות
  if (live.high_52w && live.low_52w) {
    const nearHigh = live.price >= live.high_52w * 0.95;
    const nearLow = live.price <= live.low_52w * 1.05;
    swingParams.push({
      name: 'שיא/שפל 52 שבועות',
      value: `שיא ${live.high_52w} | שפל ${live.low_52w}`,
      signal: nearHigh ? 'קרוב לשיא — זהירות' : nearLow ? 'קרוב לשפל — הזדמנות' : 'בטווח ביניים',
      direction: nearHigh ? 'sell' : nearLow ? 'buy' : 'neutral'
    });
  }

  // אנליסטים (סווינג)
  if (live.analyst_rec) {
    const isBull = ['strong_buy', 'buy'].includes(live.analyst_rec);
    const isBear = ['sell', 'strong_sell'].includes(live.analyst_rec);
    swingParams.push({
      name: 'דעת אנליסטים',
      value: live.analyst_rec + (live.analyst_target ? ` | יעד $${live.analyst_target}` : ''),
      signal: isBull ? 'המלצת קנייה' : isBear ? 'המלצת מכירה' : 'החזקה',
      direction: isBull ? 'buy' : isBear ? 'sell' : 'neutral'
    });
  }

  // דוח קרוב
  const hasEarnings = asset.type === 'stock' && live.earnings_date;
  let daysUntil = null;
  if (hasEarnings) {
    const earningsDate = new Date(live.earnings_date);
    daysUntil = Math.ceil((earningsDate - new Date()) / (1000 * 60 * 60 * 24));
    if (daysUntil > 0 && daysUntil <= 14) {
      swingParams.push({
        name: 'דוח קרוב',
        value: `${live.earnings_date} (בעוד ${daysUntil} ימים)`,
        signal: 'דוח קרוב — תנודתיות צפויה',
        direction: 'neutral'
      });
    }
  }

  // חשב ציון סווינג לפי פרמטרים
  const swingBuy = swingParams.filter(p => p.direction === 'buy').length;
  const swingSell = swingParams.filter(p => p.direction === 'sell').length;
  const swingTotal = swingParams.length;
  const swingDirection = swingBuy > swingSell ? 'LONG' : swingSell > swingBuy ? 'SHORT' : 'המתנה';
  const swingRec = swingBuy > swingSell ? 'קנייה' : swingSell > swingBuy ? 'מכירה' : 'המתנה';
  const swingScoreCount = `${swingBuy > swingSell ? swingBuy : swingSell}/${swingTotal}`;

  // Entry/Exit levels
  const dailyEntry = live.price;
  const dailyTP1 = live.resistance_1h || live.resistance_1d;
  const dailyTP2 = live.resistance_1d;
  const dailySL = live.support_1h || live.support_1d;

  const swingEntry = live.support_1w || live.price;
  const swingTP1 = live.resistance_1w;
  const swingTP2 = live.high_52w;
  const swingSL = live.support_1w;

  return {
    price_area: `${live.price} (${live.change_pct > 0 ? '+' : ''}${live.change_pct}%)`,
    live: live,
    dailyParams,
    swingParams,
    daily: {
      score: dailyScoreCount,
      scoreRaw: Math.round((dailyBuy / dailyTotal) * 10),
      recommendation: dailyRec,
      rsi_1d: live.rsi_1d,
      rsi_signal: rsiSignal(live.rsi_1d),
      volume_signal: volSignal,
      bb_signal: bbSignal,
      support_levels: [live.support_1h, live.support_1d].filter(Boolean),
      resistance_levels: [live.resistance_1h, live.resistance_1d].filter(Boolean),
      key_level: `תמיכה יומית: ${live.support_1d} | התנגדות יומית: ${live.resistance_1d}`,
      analysis: `${dailyBuy} מתוך ${dailyTotal} פרמטרים תומכים ב-${dailyDirection}. RSI יומי ${live.rsi_1d} — ${rsiSignal(live.rsi_1d)}. מגמה ${trend}.`,
      trade_setup: {
        direction: dailyDirection,
        entry_price: dailyEntry,
        entry_condition: `כניסה ב-$${dailyEntry} עם אישור נפח`,
        tp1: dailyTP1,
        tp2: dailyTP2,
        tp3: null,
        stop_loss: dailySL,
        risk_reward: dailyTP1 && dailySL ? `1:${((dailyTP1 - dailyEntry) / (dailyEntry - dailySL)).toFixed(1)}` : '1:2',
        timeframe: 'גרף שעתי',
        invalidation: `שבירה מתחת ל-${dailySL}`,
        confidence: Math.round((dailyBuy / dailyTotal) * 10)
      }
    },
    swing: {
      score: swingScoreCount,
      scoreRaw: Math.round((swingBuy / swingTotal) * 10),
      recommendation: swingRec,
      rsi_1w: live.rsi_1w,
      macd_signal: macdSignal,
      fib_levels: live.fib ? Object.values(live.fib) : [],
      fib_label: live.fib ? `פיבו 0.618: ${live.fib['0.618']}` : '',
      trend: trend,
      analyst_target: live.analyst_target ? `$${live.analyst_target}` : 'לא זמין',
      analyst_consensus: ['strong_buy','buy'].includes(live.analyst_rec) ? 'קנייה' : live.analyst_rec === 'sell' ? 'מכירה' : 'החזקה',
      analysis: `${swingBuy} מתוך ${swingTotal} פרמטרים תומכים ב-${swingDirection}. RSI שבועי ${live.rsi_1w}. מגמה ${trend}.`,
      trade_setup: {
        direction: swingDirection,
        entry_zone: `${swingEntry}-${live.price}`,
        entry_condition: `כניסה באזור $${swingEntry}-$${live.price}`,
        tp1: swingTP1,
        tp2: swingTP2,
        tp3: null,
        stop_loss: swingSL,
        hold_duration: '1-3 שבועות',
        risk_reward: swingTP1 && swingSL ? `1:${((swingTP1 - swingEntry) / (swingEntry - swingSL)).toFixed(1)}` : '1:2.5',
        partial_exit: swingTP1 ? `מכור 50% ב-$${swingTP1}` : '',
        invalidation: `שבירה מתחת ל-${swingSL}`,
        confidence: Math.round((swingBuy / swingTotal) * 10)
      }
    },
    sentiment: {
      score: live.fear_greed ? live.fear_greed.score : 50,
      label: live.fear_greed ? live.fear_greed.label : 'ניטרלי',
      market_sentiment: `מחיר ${live.price} | נפח ${volSignal} | מגמה ${trend}`
    },
    news: (live.news || []).filter(n => n.title).map(n => ({
      time: 'לאחרונה',
      headline: n.title
    })),
    earnings: {
      has_earnings: hasEarnings,
      next_date: live.earnings_date ? new Date(live.earnings_date).toLocaleDateString('he-IL') : null,
      days_until: daysUntil,
      quarter: '',
      eps_estimate: live.eps_forward ? `$${live.eps_forward}` : null,
      revenue_estimate: null,
      eps_prev: live.eps_trailing ? `$${live.eps_trailing}` : null,
      beat_miss_history: 'mixed',
      whisper_number: null,
      market_expectation: 'ניטרלי',
      impact_assessment: hasEarnings ? `דוח צפוי ב-${live.earnings_date}` : 'אין דוח קרוב',
      options_iv: null
    },
    ai_summary: `${asset.name} — ${dailyBuy > dailySell ? dailyBuy : dailySell}/${dailyTotal} פרמטרים יומיים תומכים ב${dailyRec}. ${swingBuy > swingSell ? swingBuy : swingSell}/${swingTotal} פרמטרים שבועיים תומכים ב${swingRec}. מחיר $${live.price} (${live.change_pct > 0 ? '+' : ''}${live.change_pct}%).`
  };
}

function renderTradeSetup(setup, mode) {
  if (!setup || setup.direction === 'המתנה') {
    return `<div class="trade-setup-box">
      <div class="trade-header">
        <div class="trade-direction dir-wait">⏸ המתנה — אין סטאפ כרגע</div>
      </div>
      <div style="padding:12px 16px;font-size:12px;color:var(--muted);">${setup ? setup.entry_condition || '' : ''}</div>
    </div>`;
  }

  const isLong = setup.direction === 'LONG';
  const dirClass = isLong ? 'dir-long' : 'dir-short';
  const dirIcon = isLong ? '▲' : '▼';
  const dirText = isLong ? 'LONG — קנייה' : 'SHORT — מכירה בחסר';

  const conf = setup.confidence || 5;
  const confClass = conf >= 8 ? 'conf-high' : conf >= 6 ? 'conf-mid' : 'conf-low';
  const confText = conf >= 8 ? 'ביטחון גבוה' : conf >= 6 ? 'ביטחון בינוני' : 'ביטחון נמוך';

  const entry = mode === 'daily' ? setup.entry_price : null;
  const entryZone = mode === 'swing' ? setup.entry_zone : null;
  const sl = setup.stop_loss;
  const tp1 = setup.tp1, tp2 = setup.tp2, tp3 = setup.tp3;

  // price ladder visual
  const allPrices = [sl, entry || 0, tp1, tp2, tp3].filter(Boolean);
  const minP = Math.min(...allPrices) * 0.998;
  const maxP = Math.max(...allPrices) * 1.002;
  const pct = p => ((p - minP) / (maxP - minP) * 90 + 5).toFixed(1);

  const ladderRows = [
    { label: 'SL', price: sl, color: 'var(--sell)', left: pct(sl) },
    ...(entry ? [{ label: 'כניסה', price: entry, color: 'var(--accent)', left: pct(entry) }] : []),
    { label: 'TP1', price: tp1, color: '#88ffcc', left: pct(tp1) },
    { label: 'TP2', price: tp2, color: 'var(--buy)', left: pct(tp2) },
    ...(tp3 ? [{ label: 'TP3 🎯', price: tp3, color: 'var(--gold)', left: pct(tp3) }] : []),
  ].sort((a, b) => (isLong ? a.price - b.price : b.price - a.price));

  return `
  <div class="trade-setup-box">
    <div class="trade-header">
      <div class="trade-direction ${dirClass}">${dirIcon} ${dirText}</div>
      <span class="confidence-badge ${confClass}">${confText} ${conf}/10</span>
    </div>

    <!-- Price Ladder -->
    <div class="price-ladder">
      ${ladderRows.map(r => `
        <div class="ladder-row">
          <div class="ladder-label" style="color:${r.color};">${r.label}</div>
          <div class="ladder-bar-wrap">
            <div class="ladder-dot" style="left:calc(${r.left}% - 5px);border-color:${r.color};"></div>
          </div>
          <div class="ladder-price" style="color:${r.color};">${r.price}</div>
        </div>
      `).join('')}
    </div>

    <!-- R:R -->
    <div class="rr-badge">⚖️ יחס סיכוי/סיכון: <strong>${setup.risk_reward || '—'}</strong>
      ${mode === 'swing' && setup.hold_duration ? ` &nbsp;·&nbsp; ⏱ ${setup.hold_duration}` : ''}
    </div>

    <!-- Entry condition -->
    <div style="font-size:10px;color:var(--accent);font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;margin:0 16px 4px;">תנאי כניסה</div>
    <div class="condition-box">${setup.entry_condition || (entryZone ? 'אזור כניסה: ' + entryZone : '')}</div>

    ${mode === 'swing' && setup.partial_exit ? `
    <div style="font-size:10px;color:var(--hold);font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;margin:0 16px 4px;">יציאה חלקית</div>
    <div class="condition-box" style="border-color:var(--hold);background:rgba(255,215,0,0.04);color:#d4c880;">${setup.partial_exit}</div>
    ` : ''}

    <!-- Invalidation -->
    <div class="invalid-label" style="margin:0 16px 4px;">ביטול הסטאפ — אם זה קורה, צא מיד</div>
    <div class="invalid-box">${setup.invalidation || '—'}</div>
  </div>`;
}

function renderParamList(params, direction) {
  const buyParams = params.filter(p => p.direction === 'buy');
  const sellParams = params.filter(p => p.direction === 'sell');
  const neutralParams = params.filter(p => p.direction === 'neutral');
  const supporting = direction === 'LONG' ? buyParams : direction === 'SHORT' ? sellParams : [];
  const against = direction === 'LONG' ? sellParams : direction === 'SHORT' ? buyParams : [];

  return `
    <div style="margin-bottom:12px;">
      ${params.map(p => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;">${p.name}</div>
            <div style="font-size:12px;color:var(--text);">${p.value}</div>
          </div>
          <div style="text-align:left;font-size:11px;max-width:140px;">
            <span style="color:${p.direction === 'buy' ? 'var(--buy)' : p.direction === 'sell' ? 'var(--sell)' : 'var(--muted)'};">
              ${p.direction === 'buy' ? '▲' : p.direction === 'sell' ? '▼' : '→'} ${p.signal}
            </span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

        <div class="analysis-section">
          <div class="analysis-title">📡 סנטימנט שוק</div>
          <div class="analysis-text">${sent.market_sentiment}</div>
        </div>
      </div>

      <!-- News Tab -->
      <div id="tab-news-${asset.symbol}" style="display:none;">
        <div class="analysis-section">
          <div class="analysis-title">📰 חדשות אחרונות</div>
          ${result.news && result.news.length > 0 ? result.news.map(n => `
            <div class="news-item">
              <div class="news-time">${n.time}</div>
              <div>${n.headline}</div>
            </div>
          `).join('') : '<div style="color:var(--muted);font-size:13px;">אין חדשות זמינות</div>'}
        </div>
      </div>

      <!-- Earnings Tab -->
      ${result.earnings && result.earnings.has_earnings ? `
      <div id="tab-earnings-${asset.symbol}" style="display:none;">
        ${(() => {
          const e = result.earnings;
          const urgency = e.days_until !== null && e.days_until <= 7 ? 'urgent' : e.days_until !== null && e.days_until <= 21 ? 'soon' : 'none';
          const bannerClass = urgency === 'urgent' ? 'earnings-urgent' : urgency === 'soon' ? 'earnings-soon' : 'earnings-none';
          return `
          <div class="earnings-banner ${bannerClass}">
            <span style="font-size:18px;">${urgency === 'urgent' ? '🔥' : '📅'}</span>
            <div>
              <div style="font-weight:600;">${e.days_until ? `דוח בעוד ${e.days_until} ימים` : 'דוח קרוב'}</div>
              <div class="earnings-date">${e.next_date || '—'}</div>
            </div>
          </div>
          <div class="analysis-section">
            <div class="analysis-title">📊 תחזיות</div>
            <div class="eps-row">
              <div class="eps-box"><div class="eps-label">EPS צפוי</div><div class="eps-val val-blue">${e.eps_estimate || '—'}</div></div>
              <div class="eps-box"><div class="eps-label">EPS קודם</div><div class="eps-val">${e.eps_prev || '—'}</div></div>
            </div>
          </div>`;
        })()}
      </div>
      ` : `<div id="tab-earnings-${asset.symbol}" style="display:none;"></div>`}

    </div>
  `;

  grid.appendChild(card);
}


  const card = document.createElement('div');
  card.className = 'asset-card';
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${asset.symbol}')">
      <div class="asset-info">
        <span class="asset-emoji">${asset.emoji}</span>
        <div>
          <div class="asset-name">${asset.name}</div>
          <div class="asset-symbol">${asset.symbol} · ${result.price_area}${result.earnings && result.earnings.has_earnings && result.earnings.days_until !== null && result.earnings.days_until <= 14 ? ` · <span style="color:var(--accent3);">🔥 דוח בעוד ${result.earnings.days_until} ימים</span>` : ''}</div>
        </div>
      </div>
      <div class="score-badge">
        <div>
          <span class="rec-pill ${recClass(d.recommendation)}" style="display:block;margin-bottom:4px;">יומי: ${d.recommendation}</span>
          <span class="rec-pill ${recClass(s.recommendation)}" style="display:block;">סווינג: ${s.recommendation}</span>
        </div>
        <div class="score-circle ${scoreClass(mainScore)}">${mainScore}</div>
        <span class="chevron" id="chev-${asset.symbol}">▼</span>
      </div>
    </div>

    <div class="card-body" id="body-${asset.symbol}">

      <!-- AI Summary -->
      <div class="analysis-section" style="border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.05);">
        <div class="analysis-title">🤖 סיכום AI</div>
        <div class="analysis-text">${result.ai_summary}</div>
      </div>

      <!-- Inner tabs -->
      <div class="inner-tabs">
        <button class="inner-tab active" onclick="switchInnerTab('${asset.symbol}','daily',this)">⚡ ניתוח יומי</button>
        <button class="inner-tab" onclick="switchInnerTab('${asset.symbol}','swing',this)">📈 ניתוח סווינג</button>
        <button class="inner-tab" onclick="switchInnerTab('${asset.symbol}','sentiment',this)">🧭 סנטימנט</button>
        <button class="inner-tab" onclick="switchInnerTab('${asset.symbol}','news',this)">📰 חדשות</button>
        ${result.earnings && result.earnings.has_earnings ? `<button class="inner-tab" onclick="switchInnerTab('${asset.symbol}','earnings',this)">📋 דוחות${result.earnings.days_until !== null && result.earnings.days_until <= 14 ? ' 🔥' : ''}</button>` : ''}
      </div>

      <!-- Daily Tab -->
      <div id="tab-daily-${asset.symbol}">
        <div class="metrics-grid">
          <div class="metric-box">
            <div class="metric-label">RSI יומי</div>
            <div class="metric-value ${d.rsi_1d < 30 ? 'val-green' : d.rsi_1d > 70 ? 'val-red' : 'val-blue'}">${d.rsi_1d}</div>
            <div class="metric-sub">${d.rsi_signal}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">נפח מסחר</div>
            <div class="metric-value ${d.volume_signal.includes('גבוה') ? 'val-green' : d.volume_signal.includes('נמוך') ? 'val-red' : 'val-blue'}">${d.volume_signal.includes('גבוה') ? '🔺' : d.volume_signal.includes('נמוך') ? '🔻' : '➡️'}</div>
            <div class="metric-sub">${d.volume_signal}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">Bollinger Bands</div>
            <div class="metric-value val-yellow">BB</div>
            <div class="metric-sub">${d.bb_signal}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">ציון יומי</div>
            <div class="metric-value ${d.score >= 7 ? 'val-green' : d.score >= 5 ? 'val-yellow' : 'val-red'}">${d.score}/10</div>
            <div class="metric-sub"><span class="rec-pill ${recClass(d.recommendation)}">${d.recommendation}</span></div>
          </div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">📍 רמות תמיכה והתנגדות (יומי)</div>
          <div class="levels-row">
            ${d.support_levels.map(l => `<span class="level-tag level-support">תמיכה: ${l}</span>`).join('')}
            ${d.resistance_levels.map(l => `<span class="level-tag level-resist">התנגדות: ${l}</span>`).join('')}
          </div>
          <div style="font-size:12px;color:var(--muted);">🔑 ${d.key_level}</div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">📊 ניתוח טכני יומי</div>
          <div class="analysis-text">${d.analysis}</div>
        </div>

        <!-- Trade Setup Daily -->
        <div class="analysis-title" style="margin-bottom:8px;">🎯 סטאפ מסחר יומי — כניסה ויציאה</div>
        ${renderTradeSetup(d.trade_setup, 'daily')}
      </div>

      <!-- Swing Tab -->
      <div id="tab-swing-${asset.symbol}" style="display:none;">
        <div class="metrics-grid">
          <div class="metric-box">
            <div class="metric-label">RSI שבועי</div>
            <div class="metric-value ${s.rsi_1w < 40 ? 'val-green' : s.rsi_1w > 65 ? 'val-red' : 'val-blue'}">${s.rsi_1w}</div>
            <div class="metric-sub">טווח שבועי</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">MACD</div>
            <div class="metric-value ${s.macd_signal === 'עולה' ? 'val-green' : s.macd_signal === 'יורד' ? 'val-red' : 'val-yellow'}">${s.macd_signal === 'עולה' ? '▲' : s.macd_signal === 'יורד' ? '▼' : '→'}</div>
            <div class="metric-sub">${s.macd_signal}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">מגמה</div>
            <div class="metric-value ${s.trend === 'עולה' ? 'val-green' : s.trend === 'יורד' ? 'val-red' : 'val-yellow'}">${s.trend === 'עולה' ? '📈' : s.trend === 'יורד' ? '📉' : '↔️'}</div>
            <div class="metric-sub">${s.trend}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">ציון סווינג</div>
            <div class="metric-value ${s.score >= 7 ? 'val-green' : s.score >= 5 ? 'val-yellow' : 'val-red'}">${s.score}/10</div>
            <div class="metric-sub"><span class="rec-pill ${recClass(s.recommendation)}">${s.recommendation}</span></div>
          </div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">📐 רמות פיבונאצ'י</div>
          <div class="levels-row">
            ${s.fib_levels.map(l => `<span class="level-tag level-fib">FIB: ${l}</span>`).join('')}
          </div>
          <div style="font-size:12px;color:var(--muted);">רמה רלוונטית: ${s.fib_label}</div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">🏦 אנליסטים ומוסדות</div>
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;">יעד: <strong class="val-blue">${s.analyst_target}</strong></span>
            <span class="rec-pill ${recClass(s.analyst_consensus === 'החזקה' ? 'המתנה' : s.analyst_consensus)}">${s.analyst_consensus}</span>
          </div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">📈 ניתוח סווינג</div>
          <div class="analysis-text">${s.analysis}</div>
        </div>

        <!-- Trade Setup Swing -->
        <div class="analysis-title" style="margin-bottom:8px;">🎯 סטאפ סווינג — כניסה ויציאה</div>
        ${renderTradeSetup(s.trade_setup, 'swing')}
      </div>

      <!-- Sentiment Tab -->
      <div id="tab-sentiment-${asset.symbol}" style="display:none;">
        <div class="analysis-section">
          <div class="analysis-title">🧭 מד פחד וחמדנות</div>
          <div style="margin-bottom:12px;">
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${sent.score > 60 ? 'var(--buy)' : sent.score < 40 ? 'var(--sell)' : 'var(--hold)'};">${sent.score}</div>
            <div style="font-size:13px;color:var(--muted);">${sent.label}</div>
          </div>
          <div class="sentiment-bar-wrap">
            <div class="sentiment-label"><span>פחד קיצוני</span><span>חמדנות קיצונית</span></div>
            <div class="sentiment-bar">
              <div class="sentiment-fill" style="width:${sent.score}%;background:linear-gradient(90deg,var(--sell),var(--hold),var(--buy));"></div>
            </div>
          </div>
        </div>
        <div class="analysis-section">
          <div class="analysis-title">📡 סנטימנט שוק</div>
          <div class="analysis-text">${sent.market_sentiment}</div>
        </div>
      </div>

      <!-- News Tab -->
      <div id="tab-news-${asset.symbol}" style="display:none;">
        <div class="analysis-section">
          <div class="analysis-title">📰 חדשות אחרונות (48 שעות)</div>
          ${result.news.map(n => `
            <div class="news-item">
              <div class="news-time">${n.time}</div>
              <div>${n.headline}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Earnings Tab -->
      ${result.earnings && result.earnings.has_earnings ? `
      <div id="tab-earnings-${asset.symbol}" style="display:none;">

        ${(() => {
          const e = result.earnings;
          const urgency = e.days_until !== null && e.days_until <= 7 ? 'urgent'
                        : e.days_until !== null && e.days_until <= 21 ? 'soon' : 'none';
          const bannerClass = urgency === 'urgent' ? 'earnings-urgent' : urgency === 'soon' ? 'earnings-soon' : 'earnings-none';
          const bannerIcon = urgency === 'urgent' ? '🔥' : urgency === 'soon' ? '⏰' : '📅';
          const bannerText = e.days_until !== null
            ? urgency === 'urgent' ? `דוח בעוד ${e.days_until} ימים בלבד!`
            : urgency === 'soon'   ? `דוח בעוד ${e.days_until} ימים`
            : `דוח בעוד ${e.days_until} ימים`
            : 'אין דוח קרוב';
          return `
          <div class="earnings-banner ${bannerClass}">
            <span style="font-size:18px;">${bannerIcon}</span>
            <div>
              <div style="font-weight:600;">${bannerText}</div>
              <div class="earnings-date">${e.next_date || '—'} · ${e.quarter || ''}</div>
            </div>
          </div>`;
        })()}

        <div class="analysis-section">
          <div class="analysis-title">📊 תחזיות אנליסטים לדוח</div>
          <div class="eps-row">
            <div class="eps-box">
              <div class="eps-label">EPS צפוי</div>
              <div class="eps-val val-blue">${result.earnings.eps_estimate || '—'}</div>
            </div>
            <div class="eps-box">
              <div class="eps-label">EPS קודם</div>
              <div class="eps-val">${result.earnings.eps_prev || '—'}</div>
            </div>
            <div class="eps-box">
              <div class="eps-label">הכנסות צפויות</div>
              <div class="eps-val val-blue">${result.earnings.revenue_estimate || '—'}</div>
            </div>
          </div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">🎯 ציפיות שוק</div>
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
            <span class="rec-pill ${result.earnings.market_expectation === 'חיובי' ? 'rec-buy' : result.earnings.market_expectation === 'שלילי' ? 'rec-sell' : 'rec-hold'}">${result.earnings.market_expectation}</span>
            <span style="font-size:12px;color:var(--muted);">היסטוריה: <strong style="color:${result.earnings.beat_miss_history === 'beat' ? 'var(--buy)' : result.earnings.beat_miss_history === 'miss' ? 'var(--sell)' : 'var(--hold)'};">${result.earnings.beat_miss_history === 'beat' ? '✅ עוקף תחזיות' : result.earnings.beat_miss_history === 'miss' ? '❌ מפספס תחזיות' : '🔀 מעורב'}</strong></span>
          </div>
          <div style="margin-bottom:8px;">
            <div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;margin-bottom:4px;">WHISPER NUMBER</div>
            <div style="font-size:13px;color:var(--gold);">💬 ${result.earnings.whisper_number || '—'}</div>
          </div>
          ${result.earnings.options_iv ? `<div style="font-size:12px;color:var(--muted);">📈 IV אופציות: ${result.earnings.options_iv}</div>` : ''}
        </div>

        <div class="analysis-section" style="border-color:rgba(255,107,53,0.3);background:rgba(255,107,53,0.05);">
          <div class="analysis-title">⚡ השפעה צפויה על המסחר</div>
          <div class="analysis-text">${result.earnings.impact_assessment}</div>
        </div>

      </div>
      ` : `<div id="tab-earnings-${asset.symbol}" style="display:none;"></div>`}

    </div>
  `;

  grid.appendChild(card);
}

function toggleCard(symbol) {
  const body = document.getElementById('body-' + symbol);
  const chev = document.getElementById('chev-' + symbol);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function switchInnerTab(symbol, tab, el) {
  ['daily', 'swing', 'sentiment', 'news', 'earnings'].forEach(t => {
    const el2 = document.getElementById(`tab-${t}-${symbol}`);
    if (el2) el2.style.display = t === tab ? 'block' : 'none';
  });
  el.closest('.inner-tabs').querySelectorAll('.inner-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
